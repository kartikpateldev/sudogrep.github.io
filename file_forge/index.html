<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Forge: Convert & Extract</title>
    
    <meta property="og:title" content="File Forge: Convert & Extract">
    <meta property="og:description" content="Convert and extract files with ease. Available on Android, coming soon to iOS!">
    <meta property="og:image" content="https://kartikpatel.dev/file_forge/app_icon.png">
    <meta property="og:url" content="https://kartikpatel.dev/file_forge">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="File Forge: Convert & Extract">
    <meta name="twitter:description" content="Convert and extract files with ease. Available on Android, coming soon to iOS!">
    <meta name="twitter:image" content="https://kartikpatel.dev/file_forge/app_icon.png">
    
    <meta name="description" content="File Forge - Convert and extract files with ease. Available on Android, coming soon to iOS!">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .coming-soon {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .description {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 16px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .redirect-message {
            color: #666;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="loader"></div>
        <p class="redirect-message">Redirecting...</p>
    </div>

    <script>
        function isIOS() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            return /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
        }

        function showComingSoon() {
            document.getElementById('content').innerHTML = `
                <img src="app_icon.png" alt="File Forge Icon" class="app-icon">
                <h1>File Forge: Convert & Extract</h1>
                <div class="coming-soon">Coming Soon!</div>
                <p class="description">We're working hard to bring File Forge to iOS. Stay tuned!</p>
            `;
        }

        function redirectToPlayStore() {
            window.location.href = 'https://play.google.com/store/apps/details?id=dev.kartikpatel.fileforge';
        }

        if (isIOS()) {
            showComingSoon();
        } else {
            redirectToPlayStore();
        }
    </script>
</body>
</html>
